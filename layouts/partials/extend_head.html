<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>
<script>
  window.addEventListener('load', function() {
    VANTA.NET({
      el: "html",
      mouseControls: true,
      touchControls: true,
      gyroControls: false,
      minHeight: 200.00,
      minWidth: 200.00,
      scale: 1.00,
      scaleMobile: 1.00,
      backgroundColor: 0x657694,
      color: 0xAFFFFF,
      points: 12.00,
      maxDistance: 19.00,
      spacing: 16.00,
      showDots: true
    });
  });
</script>
