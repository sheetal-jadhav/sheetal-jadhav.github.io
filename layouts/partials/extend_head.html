<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>
<script>
  window.addEventListener('load', function() {
    var vantaDiv = document.createElement('div');
    vantaDiv.id = 'vanta-bg';
    vantaDiv.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;';
    document.body.prepend(vantaDiv);
    VANTA.NET({
      el: '#vanta-bg',
      mouseControls: true,
      touchControls: true,
      gyroControls: false,
      minHeight: 200.00,
      minWidth: 200.00,
      scale: 1.00,
      scaleMobile: 1.00,
      backgroundColor: 0x657694,
      color: 0xAFFFFF,
      points: 12.00,
      maxDistance: 19.00,
      spacing: 16.00,
      showDots: true
    });
  });
</script>
